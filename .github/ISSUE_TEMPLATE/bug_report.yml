name: Bug Report
description: Report a reproducible problem with WinUI.Markdown.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: render-mode
    attributes:
      label: Render mode
      options:
        - Auto
        - Native
        - WebView2
    validations:
      required: true
  - type: textarea
    id: markdown
    attributes:
      label: Minimal Markdown sample
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
